server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Cache static assets aggressively (filenames are hashed by Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Never cache the service worker or manifest
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
        try_files $uri =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
        types { } default_type "application/manifest+json";
        try_files $uri =404;
    }

    # Never cache index.html (so new deploys are picked up immediately)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }

    # SPA fallback — every unknown route serves index.html so React Router can handle it
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: hide nginx version
    server_tokens off;
}
