name: Deploy Supabase DB (Enterprise)

on:
  push:
    branches: [ main, dev ]

jobs:
  deploy-db:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Run enterprise migrations
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh $SSH_USER@$SSH_HOST "bash -s" <<'EOSSH'
          set -euo pipefail
          cd ~/mazonhaosher.co.il

          echo "=== Preparing migration table ==="
          docker exec supabase-db psql -U postgres -d postgres <<'SQL'
          CREATE TABLE IF NOT EXISTS schema_migrations (
            version TEXT PRIMARY KEY,
            checksum TEXT NOT NULL,
            executed_at TIMESTAMP DEFAULT now()
          );
          SQL

          echo "=== Running migrations ==="

          for file in $(ls supabase/migrations/*.sql | sort); do
            version=$(basename "$file")
            checksum=$(sha256sum "$file" | awk '{print $1}')

            exists=$(docker exec supabase-db psql -U postgres -d postgres -tAc \
              "SELECT 1 FROM schema_migrations WHERE version='$version';")

            if [ "$exists" = "1" ]; then
              echo "SKIP $version"
              continue
            fi

            echo "APPLY $version"

            if docker exec -i supabase-db psql -U postgres -d postgres < "$file"; then
              docker exec supabase-db psql -U postgres -d postgres \
                -c "INSERT INTO schema_migrations(version, checksum) VALUES ('$version','$checksum');"
            else
              echo "FAILED migration $version"
              exit 1
            fi
          done

          echo "=== DONE ==="
EOSSH
