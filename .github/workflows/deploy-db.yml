name: Deploy Supabase DB (GOD)

on:
  push:
    branches: [ main, dev ]

jobs:
  deploy-db:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SSH
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: GOD migrations
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh $SSH_USER@$SSH_HOST "bash -s" <<'EOSSH'
          set -euo pipefail
          cd ~/mazonhaosher.co.il

          echo "=== INIT MIGRATION INFRA ==="

          docker exec supabase-db psql -U postgres -d postgres <<'SQL'
          CREATE TABLE IF NOT EXISTS schema_migrations (
            version TEXT PRIMARY KEY,
            checksum TEXT NOT NULL,
            executed_at TIMESTAMP DEFAULT now()
          );

          CREATE TABLE IF NOT EXISTS migration_lock (
            id INT PRIMARY KEY,
            locked_at TIMESTAMP
          );

          INSERT INTO migration_lock(id)
          VALUES (1)
          ON CONFLICT DO NOTHING;
          SQL

          echo "=== LOCKING ==="

          docker exec supabase-db psql -U postgres -d postgres -c \
            "UPDATE migration_lock SET locked_at=now() WHERE id=1;"

          echo "=== MIGRATION START ==="

          for file in $(ls supabase/migrations/*.sql | sort); do

            version=$(basename "$file")
            checksum=$(sha256sum "$file" | awk '{print $1}')

            existing_checksum=$(docker exec supabase-db psql -U postgres -d postgres -tAc \
              "SELECT checksum FROM schema_migrations WHERE version='$version';")

            if [ "$existing_checksum" != "" ]; then
              if [ "$existing_checksum" != "$checksum" ]; then
                echo "DRIFT DETECTED in $version"
                exit 1
              fi
              echo "SKIP $version"
              continue
            fi

            echo "APPLY $version"

            docker exec supabase-db psql -U postgres -d postgres <<SQL
BEGIN;
\i /workspace/$file
INSERT INTO schema_migrations(version, checksum)
VALUES ('$version','$checksum');
COMMIT;
SQL

          done

          echo "=== UNLOCK ==="

          docker exec supabase-db psql -U postgres -d postgres -c \
            "UPDATE migration_lock SET locked_at=NULL WHERE id=1;"

          echo "=== COMPLETE ==="
EOSSH
